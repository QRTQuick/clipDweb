<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SlipBoard — Live Transfer</title>
<link rel="manifest" href="/static/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- Ambient background orbs -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<!-- Live indicator beam -->
<div class="sync-beam" id="syncBeam"></div>

<div class="app-shell">

  <!-- Header -->
  <header class="site-header">
    <div class="logo-mark">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="10" height="10" rx="2" fill="#00e5ff" opacity="0.9"/>
        <rect x="16" y="2" width="10" height="10" rx="2" fill="#7c3aed" opacity="0.7"/>
        <rect x="2" y="16" width="10" height="10" rx="2" fill="#7c3aed" opacity="0.7"/>
        <rect x="16" y="16" width="10" height="10" rx="2" fill="#00e5ff" opacity="0.5"/>
        <line x1="12" y1="7" x2="16" y2="7" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
        <line x1="7" y1="12" x2="7" y2="16" stroke="#00e5ff" stroke-width="1.5" opacity="0.6"/>
        <line x1="21" y1="12" x2="21" y2="16" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
        <line x1="12" y1="21" x2="16" y2="21" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
      </svg>
      <span class="logo-text">SlipBoard</span>
    </div>

    <div class="live-badge" id="liveBadge">
      <span class="live-dot"></span>
      <span class="live-label">connecting…</span>
    </div>
  </header>

  <!-- Composer -->
  <main class="composer-section">
    <div class="composer-card" id="composerCard">
      <div class="composer-glow"></div>
      <label class="composer-label">DROP YOUR TEXT</label>
      <textarea
        id="text"
        class="composer-textarea"
        placeholder="Paste anything here — it instantly appears on every open tab…"
        rows="5"
      ></textarea>
      <div class="composer-footer">
        <span class="char-count" id="charCount">0 chars</span>
        <button class="send-btn" id="sendBtn" onclick="saveSlip()">
          <span class="send-btn__text">Transfer Slip</span>
          <svg class="send-btn__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <!-- Slips feed -->
  <section class="slips-section">
    <div class="slips-header">
      <h2 class="slips-title">Live Feed</h2>
      <span class="slips-count" id="slipsCount">0 slips</span>
    </div>
    <div class="slips-list" id="slips">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="20" stroke="#00e5ff" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
            <path d="M16 24h16M24 16v16" stroke="#00e5ff" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
          </svg>
        </div>
        <p>No slips yet.<br>Transfer something above.</p>
      </div>
    </div>
  </section>

</div>

<script src="/static/script.js"></script>
</body>
</html>
